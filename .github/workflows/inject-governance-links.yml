name: Inject governance links

on:
  push:
    branches: [remediation/public-release-controls]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  inject:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: remediation/public-release-controls
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Inject governance loader into every HTML page
        run: python scripts/inject_governance_links.py
      - name: Commit generated HTML updates
        run: |
          if git diff --quiet; then
            echo "No HTML changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html' 'campaigns/*.html'
          git commit -m "Add governance links sitewide"
          git push origin HEAD:remediation/public-release-controls
